name: Portfolio Rebalancer CI Pipeline

# Runs automatically on every push, or manually via a button click on GitHub
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Cloud-hosted server environment

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up JDK 23 Environment
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Execute TestNG Regression Matrix
        run: mvn clean test || true # Safe run switch ensures artifacts publish even if a test case catches an error

      - name: Publish Interactive Extent Report Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Reports-Dashboard
          path: target/extent-reports/